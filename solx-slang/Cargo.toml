[package]
name = "solx-slang"
authors.workspace = true
edition.workspace = true
version.workspace = true
description = "Slang Solidity frontend for solx"
license = "MIT OR Apache-2.0"

[lib]
doctest = false

[dependencies]
anyhow.workspace = true
serde_json.workspace = true
semver.workspace = true
# TODO: `__private_testing_utils` is required due to a slang 1.3.4 bug where
# `CompilationUnit::semantic_analysis()` is only available with this feature enabled.
slang_solidity = { version = "1.3.4", features = ["__private_backend_api", "__private_testing_utils"] }
melior = { version = "0.26", features = ["ods-dialects", "helpers"] }

solx-codegen-evm = { path = "../solx-codegen-evm" }
solx-core = { path = "../solx-core", features = ["mlir"] }
solx-mlir = { path = "../solx-mlir" }
solx-standard-json = { path = "../solx-standard-json" }
solx-utils = { path = "../solx-utils" }
