name: Windows solx-tester spike

# Stage 1 of the cross-OS tester plan: viability spike. solx-tester has
# never executed on Windows — this measures (a) whether it runs at all,
# (b) semanticTests wall-clock on the free 4-vCPU runner, (c) whether the
# path-heavy complex suite also fits. Windows process-spawn overhead
# (CreateProcess + Defender scanning) is the wildcard being measured.
#
# Build steps mirror test.yaml's Windows leg exactly (windows-2025, MSYS2
# shell, x86_64-pc-windows-gnu, RelWithDebInfo + assertions) so build-llvm
# and build-solc hit the finished-install caches saved on main
# (v1-llvm-Windows-X64-*, v1-solc-Windows-X64-*).

on:
  push:
    branches:
      - win-tester-spike

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tester:
    runs-on: windows-2025
    timeout-minutes: 240
    env:
      CARGO_INCREMENTAL: "0"
      RUST_BACKTRACE: full
      BOOST_PREFIX: ${{ github.workspace }}/solx-solidity/boost/lib
      SOLC_PREFIX: ${{ github.workspace }}/solx-solidity/build
      # Dev profile, deliberately: the restored v1-llvm cache (and its bundled
      # libstdc++.a) predates the runner's current MSYS2 GCC, and only the
      # dev-profile llvm-sys objects in main's Swatinem cache share that ABI.
      # A release build recompiles llvm-sys with today's GCC and dies on
      # multiple-definition conflicts against the cached libstdc++.a (run
      # 29415024519). Timings below are therefore upper bounds.
      TESTER_BIN: ./target/x86_64-pc-windows-gnu/debug/solx-tester.exe
      SOLX_BIN: ./target/x86_64-pc-windows-gnu/debug/solx.exe
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true
          persist-credentials: false

      # Same raw form as test.yaml — checks out submodules disabled in .gitmodules.
      - name: Checkout submodules
        shell: bash
        run: |
          git config --global --add safe.directory '*'
          git submodule update --force --depth=1 --recursive --checkout

      - name: Setup SFW
        uses: ./.github/actions/setup-sfw

      - name: Prepare Windows env
        uses: ./.github/actions/prepare-msys

      - name: Runner environment
        shell: msys2 {0}
        run: |
          nproc
          df -h .
          uname -a

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          prefix-key: build-and-test-v2
          cache-on-failure: true
          save-if: 'false'

      - name: Build LLVM
        uses: ./.github/actions/build-llvm
        with:
          build-type: RelWithDebInfo
          enable-assertions: 'true'
          enable-mlir: 'true'
          enable-utils: 'true'

      - name: Build solc
        uses: ./.github/actions/build-solc
        with:
          cmake-build-type: RelWithDebInfo
          working-dir: 'solx-solidity'

      # Verbatim from test.yaml: the Windows disk cannot hold LLVM sources,
      # build trees, and a Rust workspace build at once.
      - name: Free disk space (remove LLVM source and build artifacts)
        shell: bash
        run: |
          echo "Before cleanup:" && df -h .
          rm -rf solx-llvm target-llvm/build-final
          # Remove solx-solidity source, keeping build/ and boost/ for tests
          find solx-solidity -mindepth 1 -maxdepth 1 ! -name build ! -name boost -exec rm -rf {} +
          rm -rf .git/modules
          echo "After cleanup:" && df -h .

      - name: Install build target
        uses: ./.github/actions/setup-rust
        with:
          target: x86_64-pc-windows-gnu

      - name: Build solx and solx-tester
        shell: msys2 {0}
        run: |
          ${SFW_PREFIX:-} cargo fetch --locked
          ${SFW_PREFIX:-} cargo build --frozen \
            --target x86_64-pc-windows-gnu --bin solx --bin solx-tester

      - name: Smoke test (one test, one thread)
        id: smoke
        continue-on-error: true
        timeout-minutes: 15
        shell: msys2 {0}
        run: |
          set +e
          "$TESTER_BIN" \
            --solidity-compiler "$SOLX_BIN" \
            --path tests/solidity/simple/default.sol \
            --threads 1 \
            --verbose
          ec=$?
          echo "smoke exit code: $ec"
          exit "$ec"

      # The measurement: Ethereum corpus under a 90-minute watchdog. On trip,
      # a tasklist snapshot shows whether solx processes are alive (hang) or
      # churning (slow), then everything solx-shaped is reaped.
      - name: Ethereum corpus run (90-minute watchdog)
        id: corpus
        continue-on-error: true
        timeout-minutes: 110
        shell: msys2 {0}
        run: |
          set +e
          start=$(date +%s)
          "$TESTER_BIN" --solidity-compiler "$SOLX_BIN" --path semanticTests &
          PID=$!
          elapsed=0
          while kill -0 "$PID" 2>/dev/null; do
            if [ "$elapsed" -ge 5400 ]; then
              echo "::error::solx-tester still running after ${elapsed}s; snapshotting, then killing"
              tasklist | grep -i "solx" || echo "(no solx processes in tasklist)"
              kill -9 "$PID"
              taskkill //F //IM solx.exe //T 2>/dev/null || true
              taskkill //F //IM solx-tester.exe //T 2>/dev/null || true
              exit 124
            fi
            sleep 30
            elapsed=$((elapsed + 30))
          done
          wait "$PID"
          ec=$?
          echo "corpus finished in $(( $(date +%s) - start ))s with exit code $ec"
          exit "$ec"

      # Path-handling coverage: multi-file projects push Windows path
      # separators and canonicalization harder than single-file semantic
      # tests. Only informative if the corpus step left time.
      - name: Complex suite run
        id: complex
        continue-on-error: true
        timeout-minutes: 45
        shell: msys2 {0}
        run: |
          set +e
          start=$(date +%s)
          "$TESTER_BIN" --solidity-compiler "$SOLX_BIN" --path tests/solidity/complex &
          PID=$!
          elapsed=0
          while kill -0 "$PID" 2>/dev/null; do
            if [ "$elapsed" -ge 2400 ]; then
              echo "::error::complex suite still running after ${elapsed}s; killing"
              tasklist | grep -i "solx" || true
              kill -9 "$PID"
              taskkill //F //IM solx.exe //T 2>/dev/null || true
              exit 124
            fi
            sleep 30
            elapsed=$((elapsed + 30))
          done
          wait "$PID"
          ec=$?
          echo "complex finished in $(( $(date +%s) - start ))s with exit code $ec"
          exit "$ec"

      - name: Fail if any stage failed
        if: steps.smoke.outcome != 'success' || steps.corpus.outcome != 'success' || steps.complex.outcome != 'success'
        shell: bash
        run: |
          echo "smoke: ${{ steps.smoke.outcome }}, corpus: ${{ steps.corpus.outcome }}, complex: ${{ steps.complex.outcome }}"
          exit 1
