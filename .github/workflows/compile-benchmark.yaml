name: Compile Benchmark

# Times `solx --standard-json` over a corpus of real-world standard-JSON
# inputs (fetched from the hardhat-published corpus repo, see "Checkout
# benchmark corpus" below) with hyperfine, comparing the PR build against a
# main build and the latest release binary, and posts the report as a PR
# comment. Label-gated like the integration suite; report-only (no pass/fail
# gating on timings).

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      include_via_ir:
        description: >-
          Also benchmark the via-IR pipeline variant (off by default; the
          EVMLA pipeline always runs). Note: workflow_dispatch runs only
          upload the artifact — the report comment is posted on PRs.
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -ex {0}

jobs:

  label-check:
    if: >-
      github.event_name == 'workflow_dispatch'
      || (contains(github.event.pull_request.labels.*.name, 'ci:compile-benchmark')
        && (github.event.action != 'labeled' || github.event.label.name == 'ci:compile-benchmark')
        && !github.event.pull_request.head.repo.fork)
    runs-on: ubuntu-24.04
    steps:
      - run: 'true'

  cooldown-check:
    name: Cargo cooldown check
    runs-on: ubuntu-24.04
    needs: label-check
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - uses: ./.github/actions/cooldown-check

  compile-benchmark:
    needs: [label-check, cooldown-check]
    permissions:
      contents: read
      pull-requests: write
      packages: read
    runs-on: solx-linux-amd64-self-hosted
    container:
      image: ghcr.io/nomicfoundation/solx-ci-runner@sha256:cd5a37f2630fdf1898ddb2ca11f8c2ecc4d572c60011fe923b27b1625f92ba15
      options: -m 110g
    # Warm caches: ~10 min builds + ~20 min benchmark. Worst case: a PR that
    # bumps solx-llvm (or its build scripts) builds both the PR and main LLVM
    # cold, sequentially.
    timeout-minutes: 180
    steps:
      - name: Checkout PR
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          submodules: true
          persist-credentials: false

      # actions/checkout's `git clean -ffdx` doesn't recurse into submodules,
      # so on a persistent self-hosted workspace a previous run can leave
      # stale dirs inside temp-solx-main. Wipe wholesale before re-checking
      # out main. (Same pattern as integration-tests.yaml.)
      - name: Reset main checkout dir
        run: rm -rf temp-solx-main

      - name: Checkout main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          submodules: true
          persist-credentials: false
          path: temp-solx-main

      - name: Checkout submodules (PR)
        uses: ./.github/actions/checkout-submodules

      - name: Checkout submodules (main)
        uses: ./.github/actions/checkout-submodules
        with:
          working-directory: temp-solx-main

      - name: Setup SFW (optional)
        uses: ./.github/actions/setup-sfw
        with:
          optional: 'true'

      # Release build without assertions: matches the released binary's
      # configuration so the three-way comparison is apples-to-apples.
      - name: Build LLVM
        uses: ./.github/actions/build-llvm
        with:
          build-type: Release
          enable-assertions: 'false'

      # Submodule SHA alone is not sufficient: `solx-dev llvm build` is
      # driven by `solx-dev/src/llvm/*`, so a PR that edits those scripts
      # without bumping the solx-llvm submodule would silently share its
      # own LLVM as the "main" baseline. Mirror the SHA + script-hash
      # check used by integration-tests.yaml.
      - name: Share LLVM with main checkout
        id: share-llvm
        run: |
          # Content hash of a directory tree (order-independent).
          hash_tree() {
            find "$1" -type f -print0 | sort -z | xargs -0 cat | sha256sum | cut -d' ' -f1
          }
          MAIN_SHA=$(git -C temp-solx-main/solx-llvm rev-parse HEAD)
          PR_SHA=$(git -C solx-llvm rev-parse HEAD)
          SCRIPT_PR=$(hash_tree solx-dev/src/llvm)
          SCRIPT_MAIN=$(hash_tree temp-solx-main/solx-dev/src/llvm)
          if [ "$MAIN_SHA" = "$PR_SHA" ] && [ "$SCRIPT_MAIN" = "$SCRIPT_PR" ]; then
            echo "LLVM SHAs and build scripts match ($PR_SHA / ${SCRIPT_PR:0:8}), sharing via symlink"
            mkdir -p temp-solx-main/target-llvm
            rm -rf temp-solx-main/target-llvm/target-final
            ln -snf "$GITHUB_WORKSPACE/target-llvm/target-final" \
                    temp-solx-main/target-llvm/target-final
            echo "shared=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::LLVM inputs differ (main=$MAIN_SHA/${SCRIPT_MAIN:0:8} PR=$PR_SHA/${SCRIPT_PR:0:8}), building main separately"
          fi

      - name: Build LLVM (main)
        if: steps.share-llvm.outputs.shared != 'true'
        run: |
          pushd temp-solx-main
          ${SFW_PREFIX:-} cargo fetch --locked
          ${SFW_PREFIX:-} cargo build --frozen --release --bin solx-dev
          ./target/release/solx-dev llvm build --build-type Release --install-distribution
          popd

      - name: Build solc (PR)
        uses: ./.github/actions/build-solc
        with:
          cmake-build-type: Release
          working-dir: 'solx-solidity'

      # Match the cache key composition in build-solc/action.yml: SHA alone
      # is not sufficient because a PR can change `solx-dev/src/solc/*`
      # without bumping the submodule pin. Without the script-hash check,
      # the PR's solc binary would be shared as the "main" baseline and
      # silently skew benchmarks.
      - name: Share solc with main checkout
        id: share-solc
        run: |
          # Content hash of a directory tree (order-independent).
          hash_tree() {
            find "$1" -type f -print0 | sort -z | xargs -0 cat | sha256sum | cut -d' ' -f1
          }
          MAIN_SHA=$(git -C temp-solx-main/solx-solidity rev-parse HEAD)
          PR_SHA=$(git -C solx-solidity rev-parse HEAD)
          SCRIPT_PR=$(hash_tree solx-dev/src/solc)
          SCRIPT_MAIN=$(hash_tree temp-solx-main/solx-dev/src/solc)
          if [ "$MAIN_SHA" = "$PR_SHA" ] && [ "$SCRIPT_MAIN" = "$SCRIPT_PR" ]; then
            echo "solc SHAs and build scripts match ($PR_SHA / ${SCRIPT_PR:0:8}), sharing via symlink"
            rm -rf temp-solx-main/solx-solidity/build temp-solx-main/solx-solidity/boost
            ln -snf "$GITHUB_WORKSPACE/solx-solidity/build" \
                    temp-solx-main/solx-solidity/build
            ln -snf "$GITHUB_WORKSPACE/solx-solidity/boost" \
                    temp-solx-main/solx-solidity/boost
            echo "shared=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::solc inputs differ (main=$MAIN_SHA/${SCRIPT_MAIN:0:8} PR=$PR_SHA/${SCRIPT_PR:0:8}), building main separately"
          fi

      - name: Build solc (main)
        if: steps.share-solc.outputs.shared != 'true'
        uses: ./.github/actions/build-solc
        with:
          cmake-build-type: 'Release'
          working-dir: 'temp-solx-main/solx-solidity'

      # Env and target mirror .github/actions/build-rust so the pr/main
      # binaries share the released binary's build configuration: the
      # statically linked glibc alone is worth ~5% on this workload.
      - name: Build solx (PR)
        env:
          BOOST_PREFIX: ${{ github.workspace }}/solx-solidity/boost/lib
          SOLC_PREFIX: ${{ github.workspace }}/solx-solidity/build
          RUSTC_BOOTSTRAP: 1
          RUSTFLAGS: '-C target-feature=+crt-static -C link-arg=-fuse-ld=lld'
        run: |
          ${SFW_PREFIX:-} cargo fetch --locked
          ${SFW_PREFIX:-} cargo build --frozen --release --bin solx --target x86_64-unknown-linux-gnu

      - name: Build solx (main)
        working-directory: temp-solx-main
        env:
          BOOST_PREFIX: ${{ github.workspace }}/temp-solx-main/solx-solidity/boost/lib
          SOLC_PREFIX: ${{ github.workspace }}/temp-solx-main/solx-solidity/build
          RUSTC_BOOTSTRAP: 1
          RUSTFLAGS: '-C target-feature=+crt-static -C link-arg=-fuse-ld=lld'
        run: |
          ${SFW_PREFIX:-} cargo fetch --locked
          ${SFW_PREFIX:-} cargo build --frozen --release --bin solx --target x86_64-unknown-linux-gnu

      - name: Download latest release binary
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          # Authenticated API call: the unauthenticated rate limit is per IP,
          # which neighboring jobs on a shared self-hosted runner can exhaust.
          # The asset download below redirects to S3 and needs no auth.
          TAG=$(curl -fsSL -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            https://api.github.com/repos/NomicFoundation/solx/releases/latest \
            | python3 -c 'import json, sys; print(json.load(sys.stdin)["tag_name"])')
          ASSET="solx-linux-amd64-gnu-v${TAG}"
          BASE="https://github.com/NomicFoundation/solx/releases/download/${TAG}"
          curl -fsSL -o solx-release "${BASE}/${ASSET}"
          curl -fsSL "${BASE}/${ASSET}.sha256" | sed "s|[^ ]*${ASSET}|solx-release|" | sha256sum -c -
          chmod +x solx-release
          ./solx-release --version

      # The image's system interpreter is Debian-managed and steps run as
      # root, so install straight from apt (no sudo in the container).
      - name: Install hyperfine
        run: |
          apt-get update -qq
          apt-get install -y hyperfine

      # Standard-JSON corpus published by the hardhat solx benchmark. This is
      # a temporary preview location — the final home is solx-corpus/ on this
      # repo's main. Pinned to a commit (not the branch tip) because
      # solx-corpus-preview is force-pushed by each hardhat PR run; bump `ref`
      # to refresh the fixtures. Non-cone sparse-checkout materializes only the
      # benchmarked files: the EVMLA and via-IR variants of the three
      # scenarios. aave-v4 is deliberately absent — its dumps need
      # EVM_DISABLE_MEMORY_SAFE_ASM_CHECK=1, which is not part of standard JSON,
      # so run.sh's validation pass would abort on it.
      - name: Checkout benchmark corpus
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: nomic-foundation-automation/hardhat-benchmark-results
          ref: 7e64fe23420127e097977b0c325744860d04c339
          path: corpus
          persist-credentials: false
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            solx-corpus/ens-verifiable-factory-solx/solx-legacy-dwarf.json
            solx-corpus/ens-verifiable-factory-solx/solx-via-ir-dwarf.json
            solx-corpus/uniswap-v4-core-solx/solx-legacy-dwarf.json
            solx-corpus/uniswap-v4-core-solx/solx-via-ir-dwarf.json
            solx-corpus/openzeppelin-contracts-0.34/solx-legacy-dwarf.json
            solx-corpus/openzeppelin-contracts-0.34/solx-via-ir-dwarf.json

      # Corpus fixtures compile with production settings (optimizer + DWARF),
      # so a full sweep is ~80 s per binary; 3 runs keep the step around
      # 20 min (hyperfine σ on this corpus is well under 1%). The per-binary
      # validation pass in run.sh doubles as cache warmup. The via-IR variant
      # is off by default and roughly doubles the sweep when enabled.
      - name: Run benchmark
        env:
          INCLUDE_VIA_IR: ${{ inputs.include_via_ir }}
        run: |
          variants=()
          if [ "${INCLUDE_VIA_IR}" = "true" ]; then
            variants=(--variant solx-legacy-dwarf --variant solx-via-ir-dwarf)
          fi
          ./tests/benchmark/run.sh \
            --bin pr=./target/x86_64-unknown-linux-gnu/release/solx \
            --bin main=./temp-solx-main/target/x86_64-unknown-linux-gnu/release/solx \
            --bin release=./solx-release \
            --fixtures corpus/solx-corpus \
            "${variants[@]}" \
            --runs 3 --warmup 1 \
            --out benchmark-out
          python3 ./tests/benchmark/report.py --dir benchmark-out --out benchmark-out/report.md

      - name: Post benchmark report comment
        if: github.event_name == 'pull_request'
        uses: mshick/add-pr-comment@ec328af66588ab8f77cdeb2c264f14aba45bbf59 # v3.12
        with:
          message-id: 'compile-benchmark-report'
          message-path: benchmark-out/report.md

      - name: Upload raw results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: compile-benchmark-results
          path: benchmark-out/
