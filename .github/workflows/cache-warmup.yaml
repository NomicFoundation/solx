name: Cache Warmup

# Proactively build and cache LLVM/solc artifacts so that downstream CI
# workflows (test, sanitizer, coverage, integration-tests) hit warm caches
# on the first run after a submodule bump.

on:
  push:
    branches:
      - main
    paths:
      - 'solx-llvm'
      - 'solx-solidity'
  schedule:
    # Daily safety net at 04:00 UTC — rebuilds any evicted caches
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: cache-warmup
  cancel-in-progress: true

jobs:

  # ── LLVM: standard config (test.yaml / build-and-test) ──────────────
  warm-llvm:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "MacOS x86"
            runner: macos-15-intel
          - name: "MacOS arm64"
            runner: macos-15
          - name: "Linux x86 gnu"
            runner: ubuntu-24.04
            image: ghcr.io/nomicfoundation/solx-ci-runner@sha256:c2b03000a1074d2cc3e6cf25a1c4fdc6eb0a61d23e63bef59205050249fa1d6e
          - name: "Linux ARM64 gnu"
            runner: ubuntu-24.04-arm
            image: ghcr.io/nomicfoundation/solx-ci-runner@sha256:c2b03000a1074d2cc3e6cf25a1c4fdc6eb0a61d23e63bef59205050249fa1d6e
          - name: "Windows"
            runner: windows-2025
    runs-on: ${{ matrix.runner }}
    container:
      image: ${{ matrix.image || '' }}
    name: "LLVM · ${{ matrix.name }}"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: Checkout submodules
        run: |
          git config --global --add safe.directory '*'
          git submodule update --force --depth=1 --recursive --checkout

      - name: Prepare Windows env
        if: runner.os == 'Windows'
        uses: ./.github/actions/prepare-msys

      - name: Setup SFW
        uses: ./.github/actions/setup-sfw

      - name: Build LLVM
        uses: ./.github/actions/build-llvm
        with:
          build-type: RelWithDebInfo
          enable-assertions: 'true'
          enable-mlir: 'true'

      # When the artifact cache is warm, build-llvm skips ccache entirely,
      # so the ccache entry's LRU timer isn't refreshed. Touch it explicitly
      # so the nightly cron keeps ccache alive past GHA's 7-day eviction
      # window. Primary key is unique → falls through to the restore-keys
      # prefix match against the ccache-action's timestamped key.
      # lookup-only: true skips the download; the cache service lookup alone
      # resets the access timer.
      - name: Touch LLVM ccache
        if: always()
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ runner.temp }}/ccache-llvm
          key: ccache-touch-${{ github.job }}-${{ github.run_id }}
          restore-keys: llvm-${{ runner.os }}-${{ runner.arch }}-RelWithDebInfo-mlir-end
          fail-on-cache-miss: false
          lookup-only: true

  # ── solc: standard config (test.yaml / build-and-test) ──────────────
  warm-solc:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "MacOS x86"
            runner: macos-15-intel
          - name: "MacOS arm64"
            runner: macos-15
          - name: "Linux x86 gnu"
            runner: ubuntu-24.04
            image: ghcr.io/nomicfoundation/solx-ci-runner@sha256:c2b03000a1074d2cc3e6cf25a1c4fdc6eb0a61d23e63bef59205050249fa1d6e
          - name: "Linux ARM64 gnu"
            runner: ubuntu-24.04-arm
            image: ghcr.io/nomicfoundation/solx-ci-runner@sha256:c2b03000a1074d2cc3e6cf25a1c4fdc6eb0a61d23e63bef59205050249fa1d6e
          - name: "Windows"
            runner: windows-2025
    runs-on: ${{ matrix.runner }}
    container:
      image: ${{ matrix.image || '' }}
    name: "solc · ${{ matrix.name }}"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: Checkout submodules
        run: |
          git config --global --add safe.directory '*'
          git submodule update --force --depth=1 --recursive --checkout

      - name: Prepare Windows env
        if: runner.os == 'Windows'
        uses: ./.github/actions/prepare-msys

      - name: Setup SFW
        uses: ./.github/actions/setup-sfw

      - name: Build solc
        uses: ./.github/actions/build-solc
        with:
          cmake-build-type: RelWithDebInfo
          boost-version: '1.83.0'
          working-dir: 'solx-solidity'

      - name: Touch solc ccache
        if: always()
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ runner.temp }}/ccache-solc
          key: ccache-touch-${{ github.job }}-${{ github.run_id }}
          restore-keys: solc-${{ runner.os }}-${{ runner.arch }}-RelWithDebInfo-end
          fail-on-cache-miss: false
          lookup-only: true

  # ── LLVM: sanitizer config (sanitizer.yaml) ─────────────────────────
  warm-llvm-sanitizer:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/nomicfoundation/solx-ci-runner@sha256:c2b03000a1074d2cc3e6cf25a1c4fdc6eb0a61d23e63bef59205050249fa1d6e
    name: "LLVM · Sanitizer"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: Checkout submodules
        run: |
          git config --global --add safe.directory '*'
          git submodule update --force --depth=1 --recursive --checkout

      - name: Setup SFW
        uses: ./.github/actions/setup-sfw

      - name: Build LLVM
        uses: ./.github/actions/build-llvm
        with:
          build-type: RelWithDebInfo
          enable-assertions: 'true'
          sanitizer: 'Address'

      - name: Touch LLVM ccache
        if: always()
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ runner.temp }}/ccache-llvm
          key: ccache-touch-${{ github.job }}-${{ github.run_id }}
          restore-keys: llvm-${{ runner.os }}-${{ runner.arch }}-RelWithDebInfo-Address-end
          fail-on-cache-miss: false
          lookup-only: true

  # ── LLVM: coverage config (coverage.yaml) ───────────────────────────
  warm-llvm-coverage:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/nomicfoundation/solx-ci-runner@sha256:c2b03000a1074d2cc3e6cf25a1c4fdc6eb0a61d23e63bef59205050249fa1d6e
    name: "LLVM · Coverage"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: Checkout submodules
        run: |
          git config --global --add safe.directory '*'
          git submodule update --force --depth=1 --recursive --checkout

      - name: Setup SFW
        uses: ./.github/actions/setup-sfw

      - name: Build LLVM
        uses: ./.github/actions/build-llvm
        with:
          build-type: RelWithDebInfo
          enable-assertions: 'false'
          enable-coverage: 'true'
          enable-mlir: 'true'

      - name: Touch LLVM ccache
        if: always()
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ runner.temp }}/ccache-llvm
          key: ccache-touch-${{ github.job }}-${{ github.run_id }}
          restore-keys: llvm-${{ runner.os }}-${{ runner.arch }}-RelWithDebInfo-mlir-coverage-no-assertions-end
          fail-on-cache-miss: false
          lookup-only: true

  # ── LLVM + solc: integration config (integration-tests.yaml) ────────
  warm-llvm-integration:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/nomicfoundation/solx-ci-runner@sha256:c2b03000a1074d2cc3e6cf25a1c4fdc6eb0a61d23e63bef59205050249fa1d6e
    name: "LLVM + solc · Integration"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: Checkout submodules
        run: |
          git config --global --add safe.directory '*'
          git submodule update --force --depth=1 --recursive --checkout

      - name: Setup SFW
        uses: ./.github/actions/setup-sfw

      - name: Build LLVM
        uses: ./.github/actions/build-llvm
        with:
          build-type: Release
          enable-assertions: 'false'

      - name: Touch LLVM ccache
        if: always()
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ runner.temp }}/ccache-llvm
          key: ccache-touch-${{ github.job }}-${{ github.run_id }}
          restore-keys: llvm-${{ runner.os }}-${{ runner.arch }}-no-assertions-end
          fail-on-cache-miss: false
          lookup-only: true

      - name: Build solc
        uses: ./.github/actions/build-solc
        with:
          cmake-build-type: Release
          working-dir: 'solx-solidity'

      - name: Touch solc ccache
        if: always()
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ runner.temp }}/ccache-solc
          key: ccache-touch-${{ github.job }}-${{ github.run_id }}
          restore-keys: solc-${{ runner.os }}-${{ runner.arch }}-Release-end
          fail-on-cache-miss: false
          lookup-only: true
