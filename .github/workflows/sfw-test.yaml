name: SFW Test

on:
  pull_request:
    types: [labeled, synchronize]

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -ex {0}

jobs:

  label-check:
    if: contains(github.event.pull_request.labels.*.name, 'ci:sfw') && !github.event.pull_request.head.repo.fork
    runs-on: ubuntu-24.04
    steps:
      - run: 'true'

  # Test SFW on native runners (no container)
  runner-matrix:
    needs: label-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux AMD64
            runner: ubuntu-24.04
          - name: macOS ARM64
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    name: Runner — ${{ matrix.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Setup SFW
        id: sfw
        uses: ./.github/actions/setup-sfw
        with:
          mode: firewall

      - name: Verify SFW is available
        if: steps.sfw.outputs.available == 'true'
        run: |
          which sfw
          sfw --version

      - name: Test sfw npm install
        if: steps.sfw.outputs.available == 'true'
        run: sfw npm install -g semver

      - name: Test sfw cargo fetch (expected SSL failure — tracking)
        if: steps.sfw.outputs.available == 'true'
        continue-on-error: true
        run: sfw cargo fetch --locked

      - name: Baseline cargo fetch (without SFW)
        run: cargo fetch --locked

  # Test SFW inside a container via npm install
  container:
    needs: label-check
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/nomicfoundation/solx-ci-runner@sha256:ba6c017ac68e658c3ba35edf5a1f1030a578737075e952c6c944efa4a7143992
    name: Container — Linux AMD64
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Install SFW via npm
        run: npm install -g sfw

      - name: Verify SFW binary
        run: |
          which sfw
          sfw --version

      - name: Test sfw npm install
        run: sfw npm install -g semver

  # Verify SFW correctly skips on Windows
  windows-skip:
    needs: label-check
    runs-on: windows-2025
    name: Windows — skip verification
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Setup SFW
        id: sfw
        uses: ./.github/actions/setup-sfw
        with:
          mode: firewall

      - name: Verify SFW was skipped
        shell: bash
        run: |
          if [[ "${{ steps.sfw.outputs.available }}" != "false" ]]; then
            echo "::error::Expected SFW to be unavailable on Windows"
            exit 1
          fi
          if command -v sfw &>/dev/null; then
            echo "::error::SFW binary should not be installed on Windows"
            exit 1
          fi
          echo "::notice::SFW correctly skipped on Windows"
