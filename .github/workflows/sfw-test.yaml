name: SFW Test

on:
  pull_request:
    types: [labeled, synchronize]

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -ex {0}

jobs:

  label-check:
    if: contains(github.event.pull_request.labels.*.name, 'ci:sfw') && !github.event.pull_request.head.repo.fork
    runs-on: ubuntu-24.04
    steps:
      - run: 'true'

  # Test SFW on native runners (no container)
  runner-matrix:
    needs: label-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux AMD64
            runner: ubuntu-24.04
          - name: macOS ARM64
            runner: macos-15
          - name: macOS x86
            runner: macos-15-intel
          - name: Windows
            runner: windows-2025
    runs-on: ${{ matrix.runner }}
    name: Runner — ${{ matrix.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Setup SFW
        id: sfw
        uses: ./.github/actions/setup-sfw
        with:
          mode: firewall

      - name: Verify SFW is available
        if: steps.sfw.outputs.available == 'true'
        run: |
          command -v sfw
          sfw --version

      - name: Test sfw npm install
        if: steps.sfw.outputs.available == 'true'
        run: sfw npm install -g semver

      - name: Discover SFW CA cert
        if: steps.sfw.outputs.available == 'true'
        run: |
          echo "=== Environment inside sfw subprocess ==="
          sfw node -e "Object.entries(process.env).filter(([k]) => /cert|ca|proxy|ssl|tls|sfw/i.test(k)).forEach(([k,v]) => console.log(k + '=' + v))" || true

          echo "=== Check NODE_EXTRA_CA_CERTS ==="
          SFW_CA=$(sfw node -e "console.log(process.env.NODE_EXTRA_CA_CERTS || '')" 2>/dev/null)
          echo "SFW CA cert path: $SFW_CA"
          if [ -n "$SFW_CA" ] && [ -f "$SFW_CA" ]; then
            ls -la "$SFW_CA"
            cat "$SFW_CA"
          fi

          echo "=== SFW temp files ==="
          ls -la /tmp/sfw* /tmp/socket* 2>/dev/null || true

      - name: Test cargo fetch with SFW CA bundle
        if: steps.sfw.outputs.available == 'true'
        continue-on-error: true
        run: |
          # Trigger SFW cert generation
          sfw npm ping || true

          # Discover SFW CA cert path
          SFW_CA=$(sfw node -e "console.log(process.env.NODE_EXTRA_CA_CERTS || '')" 2>/dev/null)
          echo "SFW CA: $SFW_CA"

          if [ -n "$SFW_CA" ] && [ -f "$SFW_CA" ]; then
            BUNDLE="${RUNNER_TEMP}/sfw-cargo-ca-bundle.pem"

            # Find system CA bundle and use it as base
            for f in \
              /etc/ssl/certs/ca-certificates.crt \
              /etc/ssl/certs/ca-bundle.crt \
              /etc/pki/tls/certs/ca-bundle.crt \
              /mingw64/etc/ssl/certs/ca-bundle.crt \
              "$(brew --prefix 2>/dev/null)/etc/ca-certificates/cert.pem"; do
              if [ -f "$f" ]; then
                cp "$f" "$BUNDLE"
                echo "System CA bundle: $f"
                break
              fi
            done

            # macOS: export system keychain certs as fallback
            if [ ! -f "$BUNDLE" ] && [ "$RUNNER_OS" = "macOS" ]; then
              security export -t certs -f pemseq \
                -k /System/Library/Keychains/SystemRootCertificates.keychain \
                > "$BUNDLE" 2>/dev/null
              echo "Used macOS system keychain export"
            fi

            # Append SFW CA cert to the bundle
            if [ -f "$BUNDLE" ]; then
              echo "" >> "$BUNDLE"
              cat "$SFW_CA" >> "$BUNDLE"
              echo "Combined bundle: $(wc -l < "$BUNDLE") lines"
              export CARGO_HTTP_CAINFO="$BUNDLE"
              export GIT_SSL_CAINFO="$BUNDLE"
            else
              echo "::warning::Could not find system CA bundle"
            fi
          else
            echo "::warning::SFW CA cert not found at: $SFW_CA"
          fi

          sfw cargo fetch --locked

      - name: Test sfw cargo fetch (without CA fix — expected SSL failure)
        if: steps.sfw.outputs.available == 'true'
        continue-on-error: true
        run: sfw cargo fetch --locked

      - name: Baseline cargo fetch (without SFW)
        run: cargo fetch --locked

  # Test SFW inside a container via npm install
  container:
    needs: label-check
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/nomicfoundation/solx-ci-runner@sha256:1df3890912821b043446539f20af01404650d2ae8f13528ce3d06bd933fb5a08
    name: Container — Linux AMD64
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Install SFW via npm
        run: npm install -g sfw

      - name: Verify SFW binary
        run: |
          command -v sfw
          sfw --version

      - name: Test sfw npm install
        run: sfw npm install -g semver

