name: Integration Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read

# Cancel the workflow if any new changes pushed to a feature branch or the trunk
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -ex {0}

jobs:

  label-check:
    if: >-
      contains(github.event.pull_request.labels.*.name, 'ci:integration')
      && (github.event.action != 'labeled'
        || contains(fromJSON('["ci:integration", "ci:integration-benchmark-full"]'), github.event.label.name))
      && !github.event.pull_request.head.repo.fork
    runs-on: ubuntu-24.04
    steps:
      - run: 'true'

  cooldown-check:
    name: Cargo cooldown check
    runs-on: ubuntu-24.04
    needs: label-check
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - uses: ./.github/actions/cooldown-check

  integration:
    needs: [label-check, cooldown-check]
    permissions:
      contents: read
      pull-requests: write
      packages: read
    runs-on: solx-linux-amd64-self-hosted
    container:
      image: ghcr.io/nomicfoundation/solx-ci-runner@sha256:79b926f62cddf00086b8a385f89e3f3281e2f37b993491e773f17d7549f7363a
      options: -m 110g
    steps:
      - name: Checkout PR
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          submodules: true

      # actions/checkout's `git clean -ffdx` doesn't recurse into submodules,
      # so on a persistent self-hosted workspace a previous run can leave
      # stale solx-solidity/{build,boost} dirs (or symlinks pointing at the
      # PR's freshly-built artifacts) inside temp-solx-main. Wipe wholesale
      # before re-checking out main.
      - name: Reset main checkout dir
        run: rm -rf temp-solx-main

      - name: Checkout main
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        continue-on-error: true
        with:
          ref: main
          submodules: true
          path: temp-solx-main

      - name: Checkout submodules (PR)
        uses: ./.github/actions/checkout-submodules

      - name: Checkout submodules (main)
        uses: ./.github/actions/checkout-submodules
        continue-on-error: true
        with:
          working-directory: temp-solx-main

      - name: Setup SFW
        uses: ./.github/actions/setup-sfw

      - name: Build LLVM
        uses: ./.github/actions/build-llvm
        with:
          build-type: Release
          enable-assertions: 'false'

      # Submodule SHA alone is not sufficient: `solx-dev llvm build` is
      # driven by `solx-dev/src/llvm/*`, so a PR that edits those scripts
      # without bumping the solx-llvm submodule would silently share its
      # own LLVM as the "main" baseline. Mirror the SHA + script-hash
      # check used by share-solc.
      - name: Share LLVM with main checkout
        id: share-llvm
        continue-on-error: true
        run: |
          # Content hash of a directory tree (order-independent).
          hash_tree() {
            find "$1" -type f -print0 | sort -z | xargs -0 cat | sha256sum | cut -d' ' -f1
          }
          MAIN_SHA=$(git -C temp-solx-main/solx-llvm rev-parse HEAD)
          PR_SHA=$(git -C solx-llvm rev-parse HEAD)
          SCRIPT_PR=$(hash_tree solx-dev/src/llvm)
          SCRIPT_MAIN=$(hash_tree temp-solx-main/solx-dev/src/llvm)
          if [ "$MAIN_SHA" = "$PR_SHA" ] && [ "$SCRIPT_MAIN" = "$SCRIPT_PR" ]; then
            echo "LLVM SHAs and build scripts match ($PR_SHA / ${SCRIPT_PR:0:8}), sharing via symlink"
            mkdir -p temp-solx-main/target-llvm
            rm -rf temp-solx-main/target-llvm/target-final
            ln -snf "$GITHUB_WORKSPACE/target-llvm/target-final" \
                    temp-solx-main/target-llvm/target-final
            echo "shared=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::LLVM inputs differ (main=$MAIN_SHA/${SCRIPT_MAIN:0:8} PR=$PR_SHA/${SCRIPT_PR:0:8}), building main separately"
          fi

      # If share-llvm failed entirely (output empty), fall through and build.
      - name: Build LLVM (main)
        if: steps.share-llvm.outputs.shared != 'true'
        continue-on-error: true
        run: |
          pushd temp-solx-main
          ${SFW_PREFIX:-} cargo fetch --locked
          ${SFW_PREFIX:-} cargo build --frozen --release --bin solx-dev
          ./target/release/solx-dev llvm build --build-type Release --install-distribution
          popd

      - name: Build solc (PR)
        uses: ./.github/actions/build-solc
        with:
          cmake-build-type: Release
          working-dir: 'solx-solidity'

      # Match the cache key composition in build-solc/action.yml: SHA alone
      # is not sufficient because a PR can change `solx-dev/src/solc/*`
      # without bumping the submodule pin. Without the script-hash check,
      # the PR's solc binary would be shared as the "main" baseline and
      # silently skew benchmarks.
      - name: Share solc with main checkout
        id: share-solc
        continue-on-error: true
        run: |
          # Content hash of a directory tree (order-independent).
          hash_tree() {
            find "$1" -type f -print0 | sort -z | xargs -0 cat | sha256sum | cut -d' ' -f1
          }
          MAIN_SHA=$(git -C temp-solx-main/solx-solidity rev-parse HEAD)
          PR_SHA=$(git -C solx-solidity rev-parse HEAD)
          SCRIPT_PR=$(hash_tree solx-dev/src/solc)
          SCRIPT_MAIN=$(hash_tree temp-solx-main/solx-dev/src/solc)
          if [ "$MAIN_SHA" = "$PR_SHA" ] && [ "$SCRIPT_MAIN" = "$SCRIPT_PR" ]; then
            echo "solc SHAs and build scripts match ($PR_SHA / ${SCRIPT_PR:0:8}), sharing via symlink"
            rm -rf temp-solx-main/solx-solidity/build temp-solx-main/solx-solidity/boost
            ln -snf "$GITHUB_WORKSPACE/solx-solidity/build" \
                    temp-solx-main/solx-solidity/build
            ln -snf "$GITHUB_WORKSPACE/solx-solidity/boost" \
                    temp-solx-main/solx-solidity/boost
            echo "shared=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::solc inputs differ (main=$MAIN_SHA/${SCRIPT_MAIN:0:8} PR=$PR_SHA/${SCRIPT_PR:0:8}), building main separately"
          fi

      # If share-solc failed entirely (output empty), fall through and build.
      - name: Build solc (main)
        if: steps.share-solc.outputs.shared != 'true'
        uses: ./.github/actions/build-solc
        continue-on-error: true
        with:
          cmake-build-type: 'Release'
          working-dir: 'temp-solx-main/solx-solidity'

      - name: Fetch dependencies (PR)
        run: ${SFW_PREFIX:-} cargo fetch --locked

      - name: Build solx (PR)
        env:
          BOOST_PREFIX: ${{ github.workspace }}/solx-solidity/boost/lib
          SOLC_PREFIX: ${{ github.workspace }}/solx-solidity/build
        run: ${SFW_PREFIX:-} cargo build --frozen --release --bin solx

      - name: Build solx-dev and solx-tester (PR)
        env:
          BOOST_PREFIX: ${{ github.workspace }}/solx-solidity/boost/lib
          SOLC_PREFIX: ${{ github.workspace }}/solx-solidity/build
        run: ${SFW_PREFIX:-} cargo build --frozen --release --bin solx-dev --bin solx-tester

      - name: Fetch dependencies (main)
        working-directory: temp-solx-main
        continue-on-error: true
        run: ${SFW_PREFIX:-} cargo fetch --locked

      - name: Build solx (main)
        working-directory: temp-solx-main
        continue-on-error: true
        env:
          BOOST_PREFIX: ${{ github.workspace }}/temp-solx-main/solx-solidity/boost/lib
          SOLC_PREFIX: ${{ github.workspace }}/temp-solx-main/solx-solidity/build
        run: ${SFW_PREFIX:-} cargo build --frozen --release --bin solx

      - name: Build solx-dev and solx-tester (main)
        working-directory: temp-solx-main
        continue-on-error: true
        env:
          BOOST_PREFIX: ${{ github.workspace }}/temp-solx-main/solx-solidity/boost/lib
          SOLC_PREFIX: ${{ github.workspace }}/temp-solx-main/solx-solidity/build
        run: ${SFW_PREFIX:-} cargo build --frozen --release --bin solx-dev --bin solx-tester

      - name: Run solx-tester tests (PR)
        id: solx_tester_tests
        continue-on-error: true
        env:
          BOOST_PREFIX: ${{ github.workspace }}/solx-solidity/boost/lib
          SOLC_PREFIX: ${{ github.workspace }}/solx-solidity/build
        run: ./target/release/solx-dev test solx-tester --solidity-compiler ./target/release/solx

      # When `ci:integration-benchmark-full` is present, enable every
      # otherwise-disabled compiler (solc, solx-latest) and its comparison
      # columns in the Foundry and Hardhat benchmark configs, so the reports
      # cover the full matrix instead of just solx (PR) vs solx-main. Scoped to
      # `[compilers.*]` and `[[comparisons]]`; disabled `[projects.*]` (hangs /
      # unsupported Solidity) are deliberately left off. Edits only this
      # throwaway CI checkout.
      - name: Enable full benchmark (all compilers + comparisons)
        if: contains(github.event.pull_request.labels.*.name, 'ci:integration-benchmark-full')
        run: |
          for cfg in solx-dev/foundry-tests.toml solx-dev/hardhat-tests.toml; do
            awk '
              /^\[/ { in_section = ($0 ~ /^\[compilers\./ || $0 ~ /^\[\[comparisons\]\]/) }
              in_section && $0 == "disabled = true" { $0 = "disabled = false" }
              { print }
            ' "$cfg" > "$cfg.tmp" && mv "$cfg.tmp" "$cfg"
          done

      - name: Run solx-tester benchmarks (main)
        id: solx_tester_bench_main
        continue-on-error: true
        working-directory: temp-solx-main
        env:
          BOOST_PREFIX: ${{ github.workspace }}/temp-solx-main/solx-solidity/boost/lib
          SOLC_PREFIX: ${{ github.workspace }}/temp-solx-main/solx-solidity/build
        run: |
          ./target/release/solx-dev test solx-tester \
            --solidity-compiler ./target/release/solx \
            --via-ir --optimizer 'M^B3' \
            --benchmark=../reference-benchmark.json

      - name: Run solx-tester benchmarks (PR)
        id: solx_tester_bench_pr
        continue-on-error: true
        env:
          BOOST_PREFIX: ${{ github.workspace }}/solx-solidity/boost/lib
          SOLC_PREFIX: ${{ github.workspace }}/solx-solidity/build
        run: |
          ./target/release/solx-dev test solx-tester \
            --solidity-compiler ./target/release/solx \
            --via-ir --optimizer 'M^B3' \
            --benchmark=candidate-benchmark.json

      - name: Build benchmark converter
        run: ${SFW_PREFIX:-} cargo build --frozen --release --bin solx-benchmark-converter

      - name: Run benchmark converter
        if: hashFiles('reference-benchmark.json') != '' && hashFiles('candidate-benchmark.json') != ''
        run: |
          cat reference-benchmark.json \
            | jq '{data: ., project: "solx-tester", toolchain: "00.solx-main"}' > reference.json
          cat candidate-benchmark.json \
            | jq '{data: ., project: "solx-tester", toolchain: "01.solx"}' > candidate.json
          ./target/release/solx-benchmark-converter \
            --output-path solx-tester-report.xlsx reference.json candidate.json

      - name: Upload solx-tester report
        if: always() && hashFiles('solx-tester-report.xlsx') != ''
        id: solx-tester-report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: solx-tester-report
          path: solx-tester-report.xlsx

      - name: Post solx-tester report comment
        if: always() && steps.solx-tester-report.outcome == 'success'
        uses: mshick/add-pr-comment@8e4927817251f1ff60c001f04568532b38e0b4a0 # v3.11
        with:
          message-id: 'solx-tester-report'
          message: |
            📊 **solx Tester Report**

            ➡️ [**Download**](${{ steps.solx-tester-report.outputs.artifact-url }})

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1

      # Some projects might use hardcoded ssh URLs: force git to use https instead.
      - name: Git https settings
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:
          git config --global url."https://".insteadOf git://

      - name: Run Hardhat tests
        id: hardhat_tests
        continue-on-error: true
        run: ./target/release/solx-dev test hardhat

      - name: Upload Hardhat report
        if: always() && hashFiles('temp-hardhat-reports/hardhat-report.xlsx') != ''
        id: hardhat-report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hardhat-report
          path: ./temp-hardhat-reports/hardhat-report.xlsx

      - name: Post Hardhat report comment
        if: always() && steps.hardhat-report.outcome == 'success'
        uses: mshick/add-pr-comment@8e4927817251f1ff60c001f04568532b38e0b4a0 # v3.11
        with:
          message-id: 'hardhat-report'
          message: |
            📊 **Hardhat Projects Report**

            ➡️ [**Download**](${{ steps.hardhat-report.outputs.artifact-url }})

      - name: Run Foundry tests
        id: foundry_tests
        continue-on-error: true
        run: ./target/release/solx-dev test foundry

      - name: Upload Foundry report
        if: always() && hashFiles('temp-foundry-reports/foundry-report.xlsx') != ''
        id: foundry-report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: foundry-report
          path: ./temp-foundry-reports/foundry-report.xlsx

      - name: Post Foundry report comment
        if: always() && steps.foundry-report.outcome == 'success'
        uses: mshick/add-pr-comment@8e4927817251f1ff60c001f04568532b38e0b4a0 # v3.11
        with:
          message-id: 'foundry-report'
          message: |
            📊 **Foundry Projects Report**

            ➡️ [**Download**](${{ steps.foundry-report.outputs.artifact-url }})

      - name: Fail workflow if tests or benchmarks failed
        if: always()
        run: |
          failures=()
          if [ "${{ steps.solx_tester_tests.outcome }}" != "success" ]; then
            failures+=("solx-tester tests")
          fi
          if [ "${{ steps.solx_tester_bench_pr.outcome }}" != "success" ]; then
            failures+=("solx-tester benchmarks (PR)")
          fi
          if [ "${{ steps.hardhat_tests.outcome }}" != "success" ]; then
            failures+=("hardhat tests")
          fi
          if [ "${{ steps.foundry_tests.outcome }}" != "success" ]; then
            failures+=("foundry tests")
          fi
          if [ ${#failures[@]} -ne 0 ]; then
            echo "Failures: ${failures[*]}"
            exit 1
          fi
