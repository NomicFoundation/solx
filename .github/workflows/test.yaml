name: Tests

# Execute workflow for each PR and with each merge to the trunk
on:
  pull_request:
    types: [opened, synchronize, reopened]
  merge_group:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read

# Cancel the workflow if any new changes pushed to a feature branch or the trunk
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:

  # Detect whether code (non-doc) files changed
  changes:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!**/*.mdx'
              - '!**/LICENSE*'

  # Check for cargo issues
  cargo-checks:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/nomicfoundation/solx-ci-runner@sha256:a3e9312d6442e028a4b9eed17ea597380ae86abf3ff4d45ba957d5a10a805790
      # Host tooling bind-mounted so the free-disk-space action can reclaim
      # ~24 GB before the cold LLVM build fills the runner's 14 GB budget.
      # Anchor shared with build-and-test below; keep in sync with the
      # matching list in cache-warmup.yaml.
      volumes: &free-disk-volumes
        - /usr/share/dotnet:/mnt/free-disk-space/dotnet
        - /usr/local/lib/android:/mnt/free-disk-space/android
        - /opt/ghc:/mnt/free-disk-space/ghc
        - /usr/local/.ghcup:/mnt/free-disk-space/ghcup
        - /opt/hostedtoolcache/CodeQL:/mnt/free-disk-space/codeql
    steps:

      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true

      - name: Free disk space
        uses: ./.github/actions/free-disk-space

      # This step is required to checkout submodules
      # that are disabled in .gitmodules config
      - name: Checkout submodules
        run: |
          git config --global --add safe.directory '*'
          git submodule update --force --depth=1 --recursive --checkout

      - name: Setup SFW
        uses: ./.github/actions/setup-sfw

      - name: Build LLVM
        uses: ./.github/actions/build-llvm
        with:
          build-type: RelWithDebInfo
          enable-assertions: 'true'
          enable-mlir: 'true'
          enable-utils: 'true'

      - name: Cargo checks
        uses: ./.github/actions/cargo-check

  cooldown-check:
    name: Cargo cooldown check
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/cooldown-check

  renovate-config-check:
    name: Renovate config check
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Renovate schema check
        run: npx --yes --package renovate -- renovate-config-validator renovate.json

      - name: Renovate extraction dry-run
        env:
          # Without a token, github-tags/github-releases lookups hit the
          # anonymous 60 req/hr rate limit shared across the runner IP.
          GITHUB_COM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOG_LEVEL: debug
        run: npx --yes renovate --platform=local --dry-run=full

  # Build and run regression tests
  build-and-test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    env:
      CARGO_INCREMENTAL: "0"
    permissions:
      contents: read
      checks: write
      packages: read
    strategy:
      fail-fast: false # finalize testing of all targets even if one failed
      matrix:
        include:
          - name: "MacOS x86"
            runner: macos-15-intel
          - name: "MacOS arm64"
            runner: macos-15
          - name: "Linux x86 gnu"
            runner: ubuntu-24.04
            image: ghcr.io/nomicfoundation/solx-ci-runner@sha256:a3e9312d6442e028a4b9eed17ea597380ae86abf3ff4d45ba957d5a10a805790
            target: "x86_64-unknown-linux-gnu"
          - name: "Linux ARM64 gnu"
            runner: ubuntu-24.04-arm
            image: ghcr.io/nomicfoundation/solx-ci-runner@sha256:a3e9312d6442e028a4b9eed17ea597380ae86abf3ff4d45ba957d5a10a805790
            target: "aarch64-unknown-linux-gnu"
          - name: "Windows"
            runner: windows-2025
            target: "x86_64-pc-windows-gnu"
    runs-on: ${{ matrix.runner }}
    container:
      image: ${{ matrix.image || '' }} # Special workaround to allow matrix builds with optional container
      # Host tooling bind-mounts for the free-disk-space action. These apply
      # only when a container is started (matrix legs with `image:` set); the
      # macOS/Windows legs run bare and the paths are irrelevant there.
      volumes: *free-disk-volumes
    name: ${{ matrix.name }}
    steps:

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true
          persist-credentials: false

      # Only meaningful on containerized Linux legs (the hosted x86 leg is the
      # disk-constrained one); a no-op on macOS/Windows since the mount points
      # don't exist there.
      - name: Free disk space
        if: runner.os == 'Linux' && matrix.image != ''
        uses: ./.github/actions/free-disk-space

      # This step is required to checkout submodules
      # that are disabled in .gitmodules config
      - name: Checkout submodules
        run: |
          git config --global --add safe.directory '*'
          git submodule update --force --depth=1 --recursive --checkout

      - name: Setup SFW
        uses: ./.github/actions/setup-sfw

      - name: Prepare Windows env
        if: runner.os == 'Windows'
        uses: ./.github/actions/prepare-msys

      - name: Free disk space (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          # Frees space only until TARGET_GB is available, cheapest phase
          # first. This job's peak demand above the post-cleanup baseline is
          # ~52 GiB (cold LLVM build, measured Jul 2026; cached runs ~34 GiB),
          # so 100 GiB covers the worst case plus runner-image variance
          # (stock free space has swung between ~11 and ~108 GiB across
          # image updates). Legs with enough stock disk skip in seconds.
          TARGET_GB=100

          avail_gb() {
            df -Pk . | awk 'NR==2 { printf "%d", $4 / 1048576 }'
          }

          echo "=== Before macOS cleanup ===" && df -h .

          if [ "$(avail_gb)" -ge "${TARGET_GB}" ]; then
            echo "Already >= ${TARGET_GB} GiB available; skipping cleanup"
            exit 0
          fi

          # 1. Simulator runtimes — stored on read-only APFS snapshot volumes,
          #    so plain `rm` fails.  `simctl runtime delete all` unmounts them.
          #    May warn on already-deleted runtimes; that is harmless.
          echo "--- Removing simulator runtimes ---"
          xcrun simctl delete all 2>&1 || true
          xcrun simctl runtime delete all 2>&1 || true

          # 2. Xcode — remove versioned copies EXCEPT the one that
          #    xcode-select points to (we need its toolchain for C/C++ builds),
          #    in batches of 4 until the target is met. Each bundle is GiBs of
          #    small files and `rm -rf` is I/O-bound per inode, so the bundles
          #    within a batch are removed concurrently (one worker each).
          #    Active Xcode path looks like /Applications/Xcode_16.2.app/Contents/Developer.
          echo "--- Removing inactive Xcode versions ---"
          ACTIVE_XCODE="$(xcode-select -p 2>/dev/null | sed 's|/Contents/Developer/*$||' || true)"
          ACTIVE_XCODE="${ACTIVE_XCODE%/}"
          removed=0
          if [ -z "${ACTIVE_XCODE}" ] || [[ "${ACTIVE_XCODE}" != /Applications/Xcode*.app ]]; then
            echo "  warning: active Xcode path '${ACTIVE_XCODE}' is not an Xcode app; skipping Xcode removal"
          else
            echo "Active Xcode (keeping): ${ACTIVE_XCODE}"
            to_remove=()
            for app in /Applications/Xcode_*.app; do
              [ -d "$app" ] || continue
              if [ "$app" = "$ACTIVE_XCODE" ]; then
                echo "  skip (active): $app"
              else
                to_remove+=("$app")
              fi
            done

            # Soft-fail: a stray rm error shouldn't sink the whole job — rm's
            # stderr will pinpoint the bad path. `removed` counts attempts,
            # not per-bundle success: xargs returns non-zero if *any* child
            # failed, and a count off by the failed bundles beats reporting
            # zero after tens of GiB were freed.
            batch=()
            flush_batch() {
              [ "${#batch[@]}" -gt 0 ] || return 0
              printf '  removing: %s\n' "${batch[@]}"
              if ! printf '%s\0' "${batch[@]}" \
                  | xargs -0 -n1 -P "${#batch[@]}" sudo rm -rf; then
                echo "  warning: one or more Xcode removals failed (see rm stderr above)"
              fi
              removed=$((removed + ${#batch[@]}))
              batch=()
            }

            if [ "${#to_remove[@]}" -gt 0 ]; then
              for app in "${to_remove[@]}"; do
                if [ "$(avail_gb)" -ge "${TARGET_GB}" ]; then
                  break
                fi
                batch+=("$app")
                if [ "${#batch[@]}" -eq 4 ]; then
                  flush_batch
                fi
              done
              # A trailing partial batch is only removed if still needed.
              if [ "$(avail_gb)" -lt "${TARGET_GB}" ]; then
                flush_batch
              fi
            fi
            echo "Removed ${removed} of ${#to_remove[@]} inactive Xcode version(s); $(avail_gb) GiB now available"
          fi

          # 3. Remaining large packages that this project never uses — only
          #    reached when the Xcode phase alone couldn't meet the target.
          #    Each path is removed individually so a missing path doesn't
          #    mask a real permission error on another.
          if [ "$(avail_gb)" -lt "${TARGET_GB}" ]; then
            echo "--- Removing unused SDKs and caches ---"
            for dir in \
              /Library/Developer/CoreSimulator \
              /usr/local/lib/android \
              "${RUNNER_TOOL_CACHE:-/Users/runner/hostedtoolcache}"; do
              if [ -d "$dir" ]; then
                echo "  removing: $dir"
                sudo rm -rf "$dir" || echo "  warning: failed to remove $dir"
              else
                echo "  not found (skipped): $dir"
              fi
            done
          fi

          if [ "$(avail_gb)" -lt "${TARGET_GB}" ]; then
            echo "warning: still below ${TARGET_GB} GiB after all cleanup phases; a cold LLVM build may hit ENOSPC"
          fi

          echo "=== After macOS cleanup ===" && df -h .

      - name: Cache cargo artifacts
        if: ${{ !matrix.image }}
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          prefix-key: build-and-test-v2
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build LLVM
        uses: ./.github/actions/build-llvm
        with:
          build-type: RelWithDebInfo
          enable-assertions: 'true'
          enable-mlir: 'true'
          enable-utils: 'true'

      - name: Building solc
        uses: ./.github/actions/build-solc
        with:
          cmake-build-type: RelWithDebInfo
          working-dir: 'solx-solidity'

      - name: Free disk space (remove LLVM source and build artifacts)
        shell: bash
        run: |
          echo "Before cleanup:" && df -h .
          rm -rf solx-llvm target-llvm/build-final
          # Remove solx-solidity source, keeping build/ and boost/ for tests
          find solx-solidity -mindepth 1 -maxdepth 1 ! -name build ! -name boost -exec rm -rf {} +
          rm -rf .git/modules
          echo "After cleanup:" && df -h .

      - name: Run tests
        uses: ./.github/actions/rust-unit-tests
        env:
          BOOST_PREFIX: ${{ github.workspace }}/solx-solidity/boost/lib
          SOLC_PREFIX: ${{ github.workspace }}/solx-solidity/build
        with:
          target: ${{ matrix.target || '' }}

  # Special job that allows some of the jobs to be skipped or failed
  # requiring others to be successful
  pr-checks:
    name: PR Checks (Tests)
    runs-on: ubuntu-24.04
    if: always()
    needs:
      - changes
      - cargo-checks
      - build-and-test
      - cooldown-check
      - renovate-config-check
    steps:
      - name: Decide on PR checks
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: >-
            ${{ needs.changes.outputs.code != 'true' && 'cargo-checks, build-and-test, cooldown-check, renovate-config-check' || '' }}
