name: Tests

# Execute workflow for each PR and with each merge to the trunk
on:
  pull_request:
    types: [opened, synchronize, reopened]
  merge_group:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read

# Cancel the workflow if any new changes pushed to a feature branch or the trunk
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:

  # Detect whether code (non-doc) files changed
  changes:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
      devcontainer: ${{ steps.filter-devcontainer.outputs.devcontainer }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!**/*.mdx'
              - '!**/LICENSE*'
      # Separate step: the OR-list below needs the default 'some' quantifier,
      # while the negation-style filter above needs 'every'. The docker dir is
      # included because the devcontainer builds its `base` stage locally;
      # rust-toolchain.toml because the container resolves it lazily on first
      # use.
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter-devcontainer
        with:
          filters: |
            devcontainer:
              - '.devcontainer/**'
              - '.github/docker/**'
              - 'rust-toolchain.toml'

  # Smoke-test the devcontainer: the runner Dockerfile's `base` stage and the
  # dev layer build (locally, no registry auth — same flow as a developer
  # machine), the non-root user and volume mounts work, and the pinned Rust
  # toolchain resolves. Deliberately does NOT build LLVM — that stays a
  # documented local step (docs/src/developer-guide/00-development-container.md).
  validate-devcontainer:
    needs: changes
    if: needs.changes.outputs.devcontainer == 'true'
    runs-on: ubuntu-24.04
    steps:

      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Shellcheck devcontainer scripts
        run: shellcheck .devcontainer/*.sh

      # Runs the container lifecycle: initializeCommand (builds the base
      # stage), the dev image layer, post-create.sh, then the smoke test.
      - name: Build devcontainer and run smoke test
        uses: devcontainers/ci@513af61f4de4f75d37e4438f184ba4358f0fc1ca # v0.3.1900000450
        with:
          configFile: .devcontainer/devcontainer.json
          push: never
          runCmd: .devcontainer/smoke-test.sh

  # Check for cargo issues
  cargo-checks:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/nomicfoundation/solx-ci-runner@sha256:a3e9312d6442e028a4b9eed17ea597380ae86abf3ff4d45ba957d5a10a805790
      # Host tooling bind-mounted so the free-disk-space-linux action can reclaim
      # ~24 GB before the cold LLVM build fills the runner's 14 GB budget.
      # Anchor shared with build-and-test below; keep in sync with the
      # matching list in cache-warmup.yaml.
      volumes: &free-disk-volumes
        - /usr/share/dotnet:/mnt/free-disk-space/dotnet
        - /usr/local/lib/android:/mnt/free-disk-space/android
        - /opt/ghc:/mnt/free-disk-space/ghc
        - /usr/local/.ghcup:/mnt/free-disk-space/ghcup
        - /opt/hostedtoolcache/CodeQL:/mnt/free-disk-space/codeql
    steps:

      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true

      - name: Free disk space (Linux)
        uses: ./.github/actions/free-disk-space-linux

      # This step is required to checkout submodules
      # that are disabled in .gitmodules config
      - name: Checkout submodules
        run: |
          git config --global --add safe.directory '*'
          git submodule update --force --depth=1 --recursive --checkout

      - name: Setup SFW
        uses: ./.github/actions/setup-sfw

      - name: Build LLVM
        uses: ./.github/actions/build-llvm
        with:
          build-type: RelWithDebInfo
          enable-assertions: 'true'
          enable-mlir: 'true'
          enable-utils: 'true'

      - name: Cargo checks
        uses: ./.github/actions/cargo-check

  cooldown-check:
    name: Cargo cooldown check
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/cooldown-check

  renovate-config-check:
    name: Renovate config check
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Renovate schema check
        run: npx --yes --package renovate -- renovate-config-validator renovate.json

      - name: Renovate extraction dry-run
        env:
          # Without a token, github-tags/github-releases lookups hit the
          # anonymous 60 req/hr rate limit shared across the runner IP.
          GITHUB_COM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOG_LEVEL: debug
        run: npx --yes renovate --platform=local --dry-run=full

  # Build and run regression tests
  build-and-test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    env:
      CARGO_INCREMENTAL: "0"
    permissions:
      contents: read
      checks: write
      packages: read
    strategy:
      fail-fast: false # finalize testing of all targets even if one failed
      matrix:
        include:
          - name: "MacOS x86"
            runner: macos-15-intel
          - name: "MacOS arm64"
            runner: macos-15
          - name: "Linux x86 gnu"
            runner: ubuntu-24.04
            image: ghcr.io/nomicfoundation/solx-ci-runner@sha256:a3e9312d6442e028a4b9eed17ea597380ae86abf3ff4d45ba957d5a10a805790
            target: "x86_64-unknown-linux-gnu"
          - name: "Linux ARM64 gnu"
            runner: ubuntu-24.04-arm
            image: ghcr.io/nomicfoundation/solx-ci-runner@sha256:a3e9312d6442e028a4b9eed17ea597380ae86abf3ff4d45ba957d5a10a805790
            target: "aarch64-unknown-linux-gnu"
          - name: "Windows"
            runner: windows-2025
            target: "x86_64-pc-windows-gnu"
    runs-on: ${{ matrix.runner }}
    container:
      image: ${{ matrix.image || '' }} # Special workaround to allow matrix builds with optional container
      # Host tooling bind-mounts for the free-disk-space-linux action. These apply
      # only when a container is started (matrix legs with `image:` set); the
      # macOS/Windows legs run bare and the paths are irrelevant there.
      volumes: *free-disk-volumes
    name: ${{ matrix.name }}
    steps:

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true
          persist-credentials: false

      # Only meaningful on containerized Linux legs (the hosted x86 leg is the
      # disk-constrained one); a no-op on macOS/Windows since the mount points
      # don't exist there.
      - name: Free disk space (Linux)
        if: runner.os == 'Linux' && matrix.image != ''
        uses: ./.github/actions/free-disk-space-linux

      # This step is required to checkout submodules
      # that are disabled in .gitmodules config
      - name: Checkout submodules
        run: |
          git config --global --add safe.directory '*'
          git submodule update --force --depth=1 --recursive --checkout

      - name: Setup SFW
        uses: ./.github/actions/setup-sfw

      - name: Prepare Windows env
        if: runner.os == 'Windows'
        uses: ./.github/actions/prepare-msys

      - name: Free disk space (macOS)
        if: runner.os == 'macOS'
        uses: ./.github/actions/free-disk-space-macos

      - name: Cache cargo artifacts
        if: ${{ !matrix.image }}
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          prefix-key: build-and-test-v2
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build LLVM
        uses: ./.github/actions/build-llvm
        with:
          build-type: RelWithDebInfo
          enable-assertions: 'true'
          enable-mlir: 'true'
          enable-utils: 'true'

      - name: Building solc
        uses: ./.github/actions/build-solc
        with:
          cmake-build-type: RelWithDebInfo
          working-dir: 'solx-solidity'

      - name: Free disk space (remove LLVM source and build artifacts)
        shell: bash
        run: |
          echo "Before cleanup:" && df -h .
          rm -rf solx-llvm target-llvm/build-final
          # Remove solx-solidity source, keeping build/ and boost/ for tests
          find solx-solidity -mindepth 1 -maxdepth 1 ! -name build ! -name boost -exec rm -rf {} +
          rm -rf .git/modules
          echo "After cleanup:" && df -h .

      - name: Run tests
        uses: ./.github/actions/rust-unit-tests
        env:
          BOOST_PREFIX: ${{ github.workspace }}/solx-solidity/boost/lib
          SOLC_PREFIX: ${{ github.workspace }}/solx-solidity/build
        with:
          target: ${{ matrix.target || '' }}

  # Special job that allows some of the jobs to be skipped or failed
  # requiring others to be successful
  pr-checks:
    name: PR Checks (Tests)
    runs-on: ubuntu-24.04
    if: always()
    needs:
      - changes
      - cargo-checks
      - build-and-test
      - cooldown-check
      - renovate-config-check
    steps:
      - name: Decide on PR checks
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: >-
            ${{ needs.changes.outputs.code != 'true' && 'cargo-checks, build-and-test, cooldown-check, renovate-config-check' || '' }}
