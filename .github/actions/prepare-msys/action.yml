name: 'Install msys2'
description: 'Prepares msys2 for Windows builds.'
runs:
  using: composite
  steps:
    # `update: true` runs `pacman -Syu` on every Windows run, pulling whatever
    # MSYS2 pushed latest. This silently invalidates the Windows ccache in
    # build-llvm/action.yml: CCACHE_COMPILERCHECK=content hashes the clang
    # binary's bytes, and MSYS2 rebuilds clang several times a week. When
    # clang's bytes change, every ccache entry misses wholesale even though
    # the GHA cache tarball still restores. Windows ccache is therefore
    # effectively a same-day cache. Step name below is a holdover — it does
    # auto-update. Flipping to `update: false` (rely on runner image's MSYS2
    # snapshot) is the obvious fix but hasn't been validated yet.
    - name: Setup msys2 (no auto-update)
      uses: msys2/setup-msys2@4f806de0a5a7294ffabaff804b38a9b435a73bda # v2.30.0
      id: msys2
      with:
        path-type: inherit
        update: true
        cache: false

    - name: Repair keyring + update + install packages
      shell: msys2 {0}
      run: |
        set -euxo pipefail

        # Keyring repair (fixes "signature is invalid")
        pacman-key --init
        pacman-key --populate msys2

        # Now install what you need
        pacman -S --noconfirm --needed \
          base-devel \
          git \
          mingw-w64-x86_64-clang \
          mingw-w64-x86_64-lld \
          mingw-w64-x86_64-cmake \
          mingw-w64-x86_64-ninja \
          mingw-w64-x86_64-gcc \
          mingw-w64-x86_64-gcc-libs \
          mingw-w64-x86_64-python

    - name: Prepare env
      shell: msys2 {0}
      run: |
        rustup set default-host x86_64-pc-windows-gnu
        echo "$(cygpath '${{ steps.msys2.outputs.msys2-location }}')/mingw64/bin" >> "${GITHUB_PATH}"
        echo "$(cygpath "$USERPROFILE")/.cargo/bin" >> "${GITHUB_PATH}"
