name: 'Install msys2'
description: 'Prepares msys2 for Windows builds.'
runs:
  using: composite
  steps:
    # `update: false` pins MSYS2 to whatever snapshot the Windows runner image
    # ships with (GitHub rotates those monthly-ish, visibly via changelog)
    # instead of `pacman -Syu`ing to upstream head on every run. Two reasons:
    #
    # 1. CCACHE_COMPILERCHECK=content in build-llvm/action.yml hashes the
    #    clang binary's bytes — uncontrolled MSYS2 refreshes invalidated the
    #    Windows ccache wholesale (observed 2026-04-23: a supposedly warm
    #    baseline rebuilt fully cold because clang's bytes had changed).
    # 2. Prior history of MSYS2 auto-updates silently breaking the build
    #    (libstdc++ incident, which led to switching to rustup's vendored
    #    MinGW for that lib).
    #
    # Toolchain bumps become intentional PRs: flip to `update: true` for a
    # one-shot validation, then back. `install:` lists packages to ensure
    # are present against the runner image's pre-seeded MSYS2 repo state.
    - name: Setup msys2
      uses: msys2/setup-msys2@4f806de0a5a7294ffabaff804b38a9b435a73bda # v2.30.0
      id: msys2
      with:
        path-type: inherit
        update: false
        cache: false
        install: >-
          base-devel
          git
          mingw-w64-x86_64-clang
          mingw-w64-x86_64-lld
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-gcc-libs
          mingw-w64-x86_64-python

    - name: Prepare env
      shell: msys2 {0}
      run: |
        rustup set default-host x86_64-pc-windows-gnu
        echo "$(cygpath '${{ steps.msys2.outputs.msys2-location }}')/mingw64/bin" >> "${GITHUB_PATH}"
        echo "$(cygpath "$USERPROFILE")/.cargo/bin" >> "${GITHUB_PATH}"
