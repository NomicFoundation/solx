# The general action to build the solx LLVM framework.
# It is universal for all platforms: Linux, MacOS and Windows.

name: 'Build LLVM'
description: 'Builds backend LLVM framework'
outputs:
  cache-hit:
    description: 'Whether the LLVM cache was hit'
    value: ${{ steps.llvm-artifact-cache.outputs.cache-hit }}
  llvm-prefix:
    description: 'Path to the LLVM installation'
    value: 'target-llvm/target-final'
inputs:
  working-dir:
    description: 'Working directory.'
    required: false
    default: '.'
  enable-tests:
    description: "Enable tests."
    required: false
    default: 'false'
  enable-assertions:
    description: "Enable assertions."
    required: false
    default: 'true'
  enable-coverage:
    description: "Enable coverage."
    required: false
    default: 'false'
  enable-mlir:
    description: "Enable MLIR support in the LLVM build."
    required: false
    default: 'false'
  sanitizer:
    description: 'A sanitizer to build LLVM with. Possible values are Address, Memory, MemoryWithOrigins, Undefined, Thread, DataFlow, and Address;Undefined'
    required: false
    default: ''
  enable-valgrind:
    description: 'Enable Valgrind for LLVM regression tests.'
    required: false
    default: 'false'
  valgrind-options:
    description: 'Space-separated list of additional valgrind options for LLVM regression tests.'
    required: false
    default: ''
  build-type:
    description: 'LLVM build type. Possible values are `Debug`, `Release`, `RelWithDebInfo`, or `MinSizeRel`. [default: Release]'
    required: false
    default: 'Release'

runs:
  using: "composite"
  steps:

    - name: Compute LLVM cache key
      id: llvm-cache
      shell: bash
      working-directory: ${{ inputs.working-dir }}
      run: |
        SHA=$(git -C solx-llvm rev-parse HEAD)
        # solx-dev owns LLVM-build cmake args (shared.rs + platforms/*.rs).
        # Hash that tree into the key so Rust-side flag changes invalidate
        # stale artifact-cache entries automatically. Truncate for readability.
        DEV_HASH=$(printf %s '${{ hashFiles(format('{0}/solx-dev/src/llvm/**', inputs.working-dir)) }}' | head -c 8)
        KEY="v1-llvm-${{ runner.os }}-${{ runner.arch }}"
        [ '${{ inputs.build-type }}' != 'Release' ] && KEY="${KEY}-${{ inputs.build-type }}"
        [ '${{ inputs.enable-mlir }}' = 'true' ] && KEY="${KEY}-mlir"
        [ -n '${{ inputs.sanitizer }}' ] && KEY="${KEY}-${{ inputs.sanitizer }}"
        [ '${{ inputs.enable-coverage }}' = 'true' ] && KEY="${KEY}-coverage"
        [ '${{ inputs.enable-assertions }}' != 'true' ] && KEY="${KEY}-no-assertions"
        KEY="${KEY}-dev${DEV_HASH}-${SHA}"
        echo "key=${KEY}" | tee -a "${GITHUB_OUTPUT}"

    # TEMP(ci:windows-tools): forced-miss so Build LLVM always runs and the
    # Windows tool-disable change is actually exercised. REVERT BEFORE MERGE.
    - name: Restore LLVM artifact cache
      id: llvm-artifact-cache
      if: false
      uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ${{ inputs.working-dir != '.' && format('{0}/target-llvm/target-final', inputs.working-dir) || 'target-llvm/target-final' }}
        key: ${{ steps.llvm-cache.outputs.key }}

    # Ninja build tool is not available on MacOS x64 runners by default. See:
    # https://github.com/actions/runner-images/issues/514
    - name: Install Ninja on MacOS x64
      if: runner.os == 'macOS' && runner.arch == 'X64' && steps.llvm-artifact-cache.outputs.cache-hit != 'true'
      shell: 'bash'
      run: HOMEBREW_NO_AUTO_UPDATE=1 brew install ninja

    - name: Install LLVM builder
      if: steps.llvm-artifact-cache.outputs.cache-hit != 'true'
      working-directory: ${{ inputs.working-dir }}
      shell: ${{ runner.os == 'Windows' && 'msys2 {0}' || 'bash' }}
      env:
        CARGO_TARGET_DIR: target
      run: ${SFW_PREFIX:-} cargo fetch --locked && ${SFW_PREFIX:-} cargo build --frozen --release --bin solx-dev

    # ccache is layered behind the SHA-keyed artifact cache: it only runs on
    # artifact-cache miss (i.e. submodule bump) and provides object-level reuse
    # across neighbouring solx-llvm commits.
    - name: Define ccache key
      if: steps.llvm-artifact-cache.outputs.cache-hit != 'true'
      shell: ${{ runner.os == 'Windows' && 'msys2 {0}' || 'bash' }}
      id: ccache-key
      run: |
        KEY="llvm-${{ runner.os }}-${{ runner.arch }}"
        [ '${{ inputs.build-type }}' != 'Release' ] && KEY="${KEY}-${{ inputs.build-type }}"
        [ '${{ inputs.enable-mlir }}' = 'true' ] && KEY="${KEY}-mlir"
        [ -n '${{ inputs.sanitizer }}' ] && KEY="${KEY}-${{ inputs.sanitizer }}"
        [ '${{ inputs.enable-coverage }}' = 'true' ] && KEY="${KEY}-coverage"
        [ '${{ inputs.enable-assertions }}' != 'true' ] && KEY="${KEY}-no-assertions"
        # Terminator: prevents shorter-variant keys from prefix-matching longer ones
        # via ccache-action's restore-keys (e.g. `...-mlir` matching `...-mlir-coverage-no-assertions`).
        KEY="${KEY}-end"
        echo "key=${KEY}" | tee -a "${GITHUB_OUTPUT}"

    # ccache-action refreshes the apt package index before installing ccache.
    # The solx-ci-runner container doesn't ship sudo (steps run as root), so
    # we invoke apt-get directly. `-qq` silences routine output.
    - name: Prepare ccache installation
      if: runner.os == 'Linux' && steps.llvm-artifact-cache.outputs.cache-hit != 'true'
      shell: 'bash'
      run: apt-get update -qq

    # sccache is broken with cmake+ninja+clang on MSYS2/Windows
    # (https://github.com/mozilla/sccache/issues/1097). Using ccache everywhere.
    #
    # KEEP-IN-SYNC with CCACHE_* env on Build LLVM and Show ccache stats steps
    # (GHA composite actions don't support YAML anchors).
    #
    # CCACHE_COMPILERCHECK=content hashes the clang binary's bytes, so ccache
    # is only stable across runs while the MSYS2 toolchain is stable. That
    # stability comes from prepare-msys/action.yml pinning MSYS2 via
    # `update: false` — if ccache starts appearing "warm but 0% hit" again,
    # check whether that pin was relaxed or the runner image rotated.
    - name: Set up compiler cache
      if: steps.llvm-artifact-cache.outputs.cache-hit != 'true'
      uses: hendrikmuhs/ccache-action@a1209f81afb8c005c13b4296c32e363431bffea5 # v1.2.14
      env:
        CCACHE_DIR: ${{ runner.temp }}/ccache-llvm
        CCACHE_BASEDIR: ${{ github.workspace }}
        CCACHE_NOHASHDIR: "true"
        CCACHE_COMPILERCHECK: "content"
      with:
        key: ${{ steps.ccache-key.outputs.key }}
        restore-keys: ${{ steps.ccache-key.outputs.key }}
        append-timestamp: true
        max-size: "10G"
        verbose: 2
        save: true # TEMP(ci:windows-tools): populate ccache on PR events so a follow-up push to this branch can measure warm-ccache + tool-disable. REVERT BEFORE MERGE to `${{ github.event_name != 'pull_request' }}`.

    - name: Build LLVM
      if: steps.llvm-artifact-cache.outputs.cache-hit != 'true'
      shell: ${{ runner.os == 'Windows' && 'msys2 {0}' || 'bash' }}
      working-directory: ${{ inputs.working-dir }}
      env:
        CCACHE_DIR: ${{ runner.temp }}/ccache-llvm
        CCACHE_BASEDIR: ${{ github.workspace }}
        CCACHE_NOHASHDIR: "true"
        CCACHE_COMPILERCHECK: "content"
        VERBOSE: 1
        LIBSTDCPP_SOURCE_PATH: "${{ runner.temp }}/msys64/mingw64/lib/libstdc++.a"
      run: |
        set -x
        [ "${{ inputs.enable-tests }}" = "true" ] && ENABLE_TESTS="--enable-tests"
        [ "${{ inputs.enable-assertions }}" = "true" ] && ENABLE_ASSERTIONS="--enable-assertions"
        [ "${{ inputs.enable-coverage }}" = "true" ] && ENABLE_COVERAGE="--enable-coverage"
        [ "${{ inputs.enable-mlir }}" = "true" ] && ENABLE_MLIR="--enable-mlir"
        [ "${{ inputs.sanitizer }}" != "" ] && SANITIZER="--sanitizer ${{ inputs.sanitizer }}"
        if [ "${{ inputs.enable-valgrind }}" = "true" ]; then
          ENABLE_VALGRIND="--enable-valgrind"
          if [ "${{ inputs.valgrind-options }}" != "" ]; then
            VALGRIND_OPTIONS=$(printf -- "--valgrind-options=%s " ${{ inputs.valgrind-options }})
          fi
        fi

        # macos-15 ARM runner is 3 vCPU / 7 GB RAM; two parallel RelWithDebInfo
        # links exceed RAM and push into swap. 2 fits 14-16 GB runners fine.
        LINK_JOBS=2
        if [ "${{ runner.os }}" = "macOS" ] && [ "${{ runner.arch }}" = "ARM64" ]; then
          LINK_JOBS=1
        fi

        # Windows tool-disable + install-distribution live in solx-dev
        # (see solx-dev/src/llvm/platforms/{shared,x86_64_windows_gnu}.rs).
        ./target/release/solx-dev llvm build --build-type ${{ inputs.build-type }} \
          --ccache-variant=ccache ${ENABLE_TESTS} ${ENABLE_VALGRIND} ${VALGRIND_OPTIONS} ${ENABLE_ASSERTIONS} ${ENABLE_COVERAGE} ${ENABLE_MLIR} ${SANITIZER} \
          --extra-args "-DCMAKE_EXPORT_COMPILE_COMMANDS='Off'" "-DLLVM_PARALLEL_LINK_JOBS='${LINK_JOBS}'" "-DLLVM_OPTIMIZED_TABLEGEN='On'"

    # `continue-on-error` keeps a failing ccache install (→ ccache not on PATH)
    # from masking the real Build LLVM failure in the step summary.
    - name: Show ccache stats
      if: always() && steps.llvm-artifact-cache.outputs.cache-hit != 'true'
      continue-on-error: true
      shell: ${{ runner.os == 'Windows' && 'msys2 {0}' || 'bash' }}
      env:
        CCACHE_DIR: ${{ runner.temp }}/ccache-llvm
        CCACHE_BASEDIR: ${{ github.workspace }}
        CCACHE_NOHASHDIR: "true"
        CCACHE_COMPILERCHECK: "content"
      run: ccache --show-stats

    - name: Save LLVM artifact cache
      if: steps.llvm-artifact-cache.outputs.cache-hit != 'true' && github.event_name != 'pull_request'
      uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ${{ inputs.working-dir != '.' && format('{0}/target-llvm/target-final', inputs.working-dir) || 'target-llvm/target-final' }}
        key: ${{ steps.llvm-cache.outputs.key }}
