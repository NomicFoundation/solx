name: 'Cargo check'
description: 'Checks cargo with check, deny, format, clippy and udeps.'

runs:
  using: composite
  steps:

    - name: Install rustc nightly
      uses: ./.github/actions/setup-rust
      with:
        toolchain: nightly

    - name: Cargo deny
      uses: EmbarkStudios/cargo-deny-action@6c8f9facfa5047ec02d8485b6bf52b587b7777d1 # v2.0.18
      with:
        command-arguments: "--allow unmaintained --hide-inclusion-graph"

    - name: Fetch dependencies
      shell: ${{ runner.os == 'Windows' && 'msys2 {0}' || 'bash' }}
      run: ${SFW_PREFIX:-} cargo fetch --locked

    - name: Cargo check
      shell: ${{ runner.os == 'Windows' && 'msys2 {0}' || 'bash' }}
      run: cargo check --frozen --verbose

    - name: Cargo format
      shell: ${{ runner.os == 'Windows' && 'msys2 {0}' || 'bash' }}
      run: cargo fmt --all -- --check --verbose

    - name: Cargo clippy
      shell: ${{ runner.os == 'Windows' && 'msys2 {0}' || 'bash' }}
      run: cargo clippy --frozen

    # Version pinned to match .github/docker/Dockerfile — on container
    # jobs this is already installed and `cargo install` is a no-op.
    - name: Cargo udeps
      shell: ${{ runner.os == 'Windows' && 'msys2 {0}' || 'bash' }}
      run: |
        ${SFW_PREFIX:-} cargo install cargo-udeps@0.1.60 --locked
        ${SFW_PREFIX:-} cargo +nightly udeps --frozen --all-targets

