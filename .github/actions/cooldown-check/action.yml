name: Cargo cooldown check
description: >-
  Verifies that all Cargo dependencies have been published for at least the
  cooldown period configured in .cargo/cooldown.toml (default 7 days).

inputs:
  ref:
    description: "Git ref to checkout. Leave empty for the default ref."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Checkout source
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      with:
        persist-credentials: false
        ref: ${{ inputs.ref }}

    - uses: ./.github/actions/setup-rust

    - name: Cache cooldown data
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: |
          **/solx-cache/cargo-cooldown-check
        key: cooldown-check-v1-${{ hashFiles('**/Cargo.lock') }}

    - uses: NomicFoundation/cargo-cooldown-check@ac40e701f9f1155741a761ac9039987fb892af4b
