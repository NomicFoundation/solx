name: Cargo cooldown check
description: >-
  Verifies that all Cargo dependencies have been published for at least the
  cooldown period configured in .cargo/cooldown.toml (default 7 days).
  The repository must already be checked out before calling this action.

runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup-rust

    - name: Cache cooldown data
      uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
      with:
        path: |
          **/target/solx-cache/cargo-cooldown-check
        key: cooldown-check-v1-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          cooldown-check-v1-${{ runner.os }}-

    - uses: NomicFoundation/cargo-cooldown-check@2d71adb59987bfb3e5d0f0191893d2961e6ae679 # v0.1.2
